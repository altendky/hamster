name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  pre-commit:
    uses: ./.github/workflows/reflow-pre-commit.yml

  python:
    uses: ./.github/workflows/reflow-python.yml

  validate:
    uses: ./.github/workflows/validate.yml

  checks:
    name: All checks
    if: always()
    needs: [pre-commit, python, validate]
    runs-on: ubuntu-latest
    steps:
      - name: Decide whether all checks passed
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
