# Spell checker configuration
# See: https://github.com/crate-ci/typos

[default.extend-words]
# "hass" is the standard abbreviation for Home Assistant, used pervasively
# in HA's codebase (e.g. hass.services, hass.states).
hass = "hass"
# "alls-green" is a GitHub Action (re-actors/alls-green) used in CI.
alls = "alls"

[default.extend-identifiers]
# PNG is a valid image format acronym
PNGs = "PNGs"

[files]
extend-exclude = []
